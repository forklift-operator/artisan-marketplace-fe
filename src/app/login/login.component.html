<div class="auth-screen-wrapper">
  <div class="auth-constrained-container">
    <div class="login-card">
      <!-- Header -->
      <div class="auth-header">
        <div class="auth-icon">🔐</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your artisan account</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="onLogin()" class="form-stack">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input
            type="email"
            [(ngModel)]="form.email"
            name="email"
            placeholder="you@example.com"
            required
            class="form-control"
          >
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            type="password"
            [(ngModel)]="form.password"
            name="password"
            placeholder="••••••••"
            required
            class="form-control"
          >
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="btn btn-primary btn-submit"
        >
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <!-- Error Message -->
      <div *ngIf="error" class="error-banner">
        {{ error }}
      </div>

      <!-- Sign Up Link -->
      <div class="auth-footer-link">
        <p>
          Don't have an account?
          <a routerLink="/register" class="text-link">
            Create one
          </a>
        </p>
      </div>
    </div>

    <!-- Testimonial -->
    <blockquote class="auth-testimonial">
      <p class="testimonial-quote">"Supporting artisans has never been easier!"</p>
      <cite class="testimonial-author">— Sarah M., Happy Customer</cite>
    </blockquote>
  </div>
</div>
