<div class="auth-screen-wrapper">
  <div class="auth-constrained-container max-w-lg">
    <div class="login-card">
      <div class="auth-header">
        <div class="auth-icon">✨</div>
        <h1 class="auth-title">Join Artisan Market</h1>
        <p class="auth-subtitle">Create your account to buy or sell handmade crafts</p>
      </div>

      <form (ngSubmit)="onRegister()" class="form-stack">
        <div class="form-row">
          <div class="field-stretch">
            <label class="form-label">First Name</label>
            <input
              type="text"
              [(ngModel)]="form.firstName"
              name="firstName"
              placeholder="John"
              required
              class="form-control"
            >
          </div>
          <div class="field-stretch">
            <label class="form-label">Last Name</label>
            <input
              type="text"
              [(ngModel)]="form.lastName"
              name="lastName"
              placeholder="Doe"
              required
              class="form-control"
            >
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input
            type="email"
            [(ngModel)]="form.email"
            name="email"
            placeholder="you@example.com"
            required
            class="form-control"
          >
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            type="password"
            [(ngModel)]="form.password"
            name="password"
            placeholder="••••••••"
            required
            class="form-control"
          >
        </div>

        <div class="form-group">
          <label class="form-label">I want to</label>
          <select
            [(ngModel)]="form.role"
            name="role"
            class="form-control select-control"
          >
            <option value="USER">Shop for Handmade Products</option>
            <option value="VENDOR">Sell My Handmade Products</option>
            <option value="ADMIN">Administrator</option>
          </select>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="termsAgreement" required class="form-checkbox">
          <label for="termsAgreement">I agree to the Terms of Service and Privacy Policy</label>
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="btn btn-primary btn-submit mt-spacing"
        >
          {{ loading ? 'Creating Account...' : 'Create Account' }}
        </button>
      </form>

      <div *ngIf="error" class="error-banner">
        {{ error }}
      </div>

      <div class="auth-footer-link">
        <p>
          Already have an account?
          <a routerLink="/login" class="text-link">
            Sign in
          </a>
        </p>
      </div>
    </div>

    <div class="features-grid">
      <div class="feature-item-card">
        <div class="feature-icon">🛍️</div>
        <h3 class="feature-title">Browse & Buy</h3>
        <p class="feature-desc">Discover unique handmade items</p>
      </div>
      <div class="feature-item-card">
        <div class="feature-icon">💰</div>
        <h3 class="feature-title">Secure Payment</h3>
        <p class="feature-desc">Safe & protected transactions</p>
      </div>
      <div class="feature-item-card">
        <div class="feature-icon">⭐</div>
        <h3 class="feature-title">Leave Reviews</h3>
        <p class="feature-desc">Share your honest feedback</p>
      </div>
    </div>
  </div>
</div>
